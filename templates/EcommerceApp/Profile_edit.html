{% extends 'EcommerceApp/Base.html' %}
{% load static %}

{% block content %}

<style>

.profile-page {

    min-height: calc(100vh - 80px);

    background:
    linear-gradient(
        270deg,
        #ff9a9e,
        #fad0c4,
        #a1c4fd,
        #c2e9fb,
        #fbc2eb
    );

    background-size:1000% 1000%;

    animation:backgroundMove 12s ease infinite;

    padding:40px 15px;

}



@keyframes backgroundMove {

    0%{
        background-position:0% 50%;
    }

    50%{
        background-position:100% 50%;
    }

    100%{
        background-position:0% 50%;
    }

}




.profile-card {

    width:100%;

    max-width:600px;

    margin:auto;

    background:rgba(255,255,255,0.95);

    border-radius:25px;

    padding:clamp(25px,5vw,60px);

    box-shadow:
    0 15px 45px rgba(0,0,0,.2);

    animation:slideUp .8s ease;

}





@keyframes slideUp {

from{

opacity:0;

transform:translateY(50px);

}

to{

opacity:1;

transform:translateY(0);

}

}





.profile-header{

text-align:center;

margin-bottom:35px;

}





.profile-image-container{


width:clamp(100px,22vw,150px);

height:clamp(100px,22vw,150px);


margin:auto;


padding:4px;


border-radius:50%;


background:
linear-gradient(
45deg,
#007bff,
#ff7e5f,
#00b4d8,
#f72585
);


background-size:400% 400%;


animation:imageBorder 5s infinite;



position:relative;


}





@keyframes imageBorder {


0%{

background-position:0% 50%;

}

50%{

background-position:100% 50%;

}

100%{

background-position:0% 50%;

}


}





.profile-image-container img{


height:100%;

width:100%;


border-radius:50%;


object-fit:cover;


background:white;


}





.profile-image-container input[type="file"]{


display:none;


}





.camera-button{


position:absolute;


right:5px;

bottom:5px;


height:40px;

width:40px;


border-radius:50%;


background:#0d6efd;


color:white;


display:flex;


align-items:center;


justify-content:center;


cursor:pointer;


box-shadow:
0 5px 15px rgba(0,0,0,.3);


transition:.3s;


}




.camera-button:hover{


transform:scale(1.15);


}





.profile-title{


color:#0d6efd;


font-weight:700;


font-size:clamp(22px,4vw,32px);


margin-top:20px;


}





.form-label{


font-weight:600;


color:#333;


}





.form-control{


width:100%;


border-radius:12px;


padding:12px 15px;


border:2px solid #ddd;


transition:.3s;


}




.form-control:focus{


border-color:#0d6efd;


box-shadow:
0 0 15px rgba(13,110,253,.3);


}





.save-button{


width:100%;


padding:14px;


border:none;


border-radius:12px;


margin-top:15px;


color:white;


font-weight:700;


font-size:16px;


background:
linear-gradient(
135deg,
#0d6efd,
#00b4d8,
#ff7e5f,
#f72585
);


background-size:300% 300%;


animation:
buttonMove 5s infinite;


transition:.3s;


}





@keyframes buttonMove {


0%{

background-position:0% 50%;

}


50%{

background-position:100% 50%;

}


100%{

background-position:0% 50%;

}


}





.save-button:hover{


transform:translateY(-3px);


box-shadow:
0 10px 25px rgba(0,0,0,.25);


}





@media(max-width:768px){


.profile-page{

padding:25px 10px;

}


.profile-card{

border-radius:20px;

}


}




@media(max-width:400px){


.profile-card{


padding:20px 15px;


}



.camera-button{


width:32px;

height:32px;

font-size:13px;


}


}



</style>





<div class="profile-page">


<div class="profile-card">



<form method="POST" enctype="multipart/form-data">


{% csrf_token %}



<div class="profile-header">


<div class="profile-image-container">



{% if request.user.profile_image %}


<img 
id="profileImage"
src="{{request.user.profile_image.url}}"
alt="Profile">


{% else %}


<img 
id="profileImage"
src="{% static 'images/default_profile.jpg' %}"
alt="Profile">


{% endif %}




{{form.profile_image}}



<label 
for="{{form.profile_image.id_for_label}}"
class="camera-button">


<i class="fas fa-camera"></i>


</label>


</div>




<h3 class="profile-title">

Edit Profile

</h3>


</div>






<div class="mb-3">


<label class="form-label">

Username

</label>


{{form.username}}


</div>





<div class="mb-3">


<label class="form-label">

Email Address

</label>


{{form.email}}


</div>





<div class="mb-3">


<label class="form-label">

Phone Number

</label>


{{form.phone_number}}


</div>





<div class="mb-3">


<label class="form-label">

Bio

</label>


{{form.bio}}


</div>






<button 
type="submit"
class="save-button">


Save Changes


</button>




</form>


</div>


</div>








<script>


const imageUpload =
document.getElementById(
"id_profile_image"
);



const profileImage =
document.getElementById(
"profileImage"
);





if(imageUpload){


imageUpload.addEventListener(
"change",
function(){


const file=this.files[0];


if(file){


const reader=new FileReader();



reader.onload=function(e){


profileImage.src=e.target.result;


};



reader.readAsDataURL(file);


}


});


}



</script>



{% endblock content %}
