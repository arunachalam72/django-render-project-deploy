{% extends 'EcommerceApp/Base.html' %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Favorites</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      color: white;
      margin-top: 40px;
      font-family: 'Poppins', sans-serif;
      padding: 60px 0;
    }
    .favorite-card {
      background: white;
      border-radius: 15px;
      overflow: hidden;
      color: #333;
      transition: 0.3s;
    }
    .favorite-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }
    .favorite-img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      transition: 0.4s;
    }
    .favorite-card:hover .favorite-img {
      transform: scale(1.05);
    }
    .btn-remove {
      background: #ff4d4d;
      color: #fff;
      border-radius: 20px;
      padding: 5px 15px;
    }
    .btn-remove:hover {
      background: #d63031;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="text-center mb-5 fw-bold">❤️ My WishList Products</h1>
    <div class="row g-4">
      {% for fav in favorites %}
      <div class="col-5 col-md-4 col-sm-6">
        <div class="favorite-card">
          <img src="{{ fav.product.product_image.url }}" class="favorite-img" alt="{{ fav.product.name }}">
          <div class="p-3 text-center">
            <h5>{{ fav.product.name }}</h5>
            <p class="text-muted mb-2">${{ fav.product.selling_price }}</p>
            <a href="{% url 'remove_from_favorite' fav.product.id %}" class="btn btn-remove">Remove</a>
          </div>
        </div>
      </div>
      {% empty %}
      <div class="text-center">
        <p class="fs-5">No favorites yet 💔</p>
        <a href="/" class="btn btn-light">Browse Products</a>
      </div>
      {% endfor %}
    </div>
  </div>
</body>
</html>
{% endblock content %}
