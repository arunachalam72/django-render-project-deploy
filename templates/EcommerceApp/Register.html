{% extends 'EcommerceApp/Base.html' %}

{% block title %} Register {% endblock title %}

{% block content %}
<style>
body {
    background: linear-gradient(135deg, #667eea, #764ba2);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Poppins', sans-serif;
}

.register-card {
    background: #fff;
    padding: 30px 25px;
    border-radius: 12px;
    width: 350px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

input {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 10px;
    background: #667eea;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

#msg {
    text-align: center;
    margin-top: 10px;
}
</style>

<div class="register-card">
    <h2>Create Account</h2>

    <form id="registerForm">
        <input type="text" id="username" placeholder="Username" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password1" placeholder="Password" required>
        <input type="password" id="password2" placeholder="Confirm Password" required>

        <button type="submit" id="registerBtn">Register</button>
    </form>

    <p id="msg"></p>
    <p style="text-align:center; margin-top:10px;"> Already have account? <a href="{% url 'login' %}">Login</a> </p>
</div>

<script>
const form = document.getElementById("registerForm");
const msg = document.getElementById("msg");
const btn = document.getElementById("registerBtn");

form.addEventListener("submit", async function(e){
    e.preventDefault();

    msg.innerText = "";

    // ✅ FIX: properly get values
    const username = document.getElementById("username").value;
    const email = document.getElementById("email").value;
    const password1 = document.getElementById("password1").value;
    const password2 = document.getElementById("password2").value;

    // frontend validation
    if(password1 !== password2){
        msg.style.color = "red";
        msg.innerText = "Passwords do not match!";
        return;
    }

    btn.innerText = "Registering...";
    btn.disabled = true;

    try {
        const response = await fetch("/api/register/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                username: username,
                email: email,
                password1: password1,
                password2: password2
            })
        });

        const data = await response.json();

        if(response.ok){
            msg.style.color = "green";
            msg.innerText = "Registered Successfully! Redirecting...";

            setTimeout(() => {
                window.location.href = "/login/";
            }, 1500);

        } else {
            msg.style.color = "red";
            msg.innerText = data.message || "Registration failed";
        }

    } catch (error) {
        msg.style.color = "red";
        msg.innerText = "Something went wrong!";
    }

    btn.innerText = "Register";
    btn.disabled = false;
});
</script>

{% endblock %}
